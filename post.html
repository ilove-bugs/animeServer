<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Send Anime-data</title>
    <style>
      * {
        font-family: sans-serif;
        padding: 0;
        margin: 0;
      }
      body{
        background: url("wallpaperflare.com_wallpaper(4).jpg");
      
        background-position: center;
      background-repeat: no-repeat;
   
      background-size: cover;
 
height: 100vh;
      }
     
      header {
        font-size: 2em;
        text-align: center;
   color: black;
        letter-spacing:2px;
        margin: 2px;
        
        text-transform: uppercase;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
        justify-content: center;

        margin: auto;
   height: 400px;
        padding: 10px;

 
        width: 75%;
        max-width: 600px;
        z-index: -2;

        background: rgba(255, 255, 255, 0.2); /* Semi-transparent background */
  backdrop-filter: blur(3px); /* Blurs only what is behind this box */
  border: 1px solid rgba(255, 255, 255, 0.3);
  padding: 2rem;
  border-radius: 10px;
      }
      input {
        width: 60%;
        padding: 7px;
        border-radius: 5px;
        border: 1px solid black;
     font-weight: bold;
     background-color: transparent;
     color: black;
      }
      button {
        font-weight: bold;
        padding: 8px;
        width: 25%;
        background: transparent;
        color: black;
        border-radius: 5px;
        border: 1px solid black;
        letter-spacing: 1px;
      }
      button:hover{
        background-color: #00A36C;
      }
    </style>
  </head>
  <body>
    <main>
      <form method="post">
        <header>Post anime</header>
        <input
          type="text"
          name="animetitle"
          id="animename"
          placeholder="Anime title"
          required
        />
        <input
          type="text"
          name="animeauthor"
          id="animeauthor"
          placeholder="Anime author"
        />
        <input
          type="number"
          name="rating"
          id="rating"
          placeholder="Rating"
          required
          step="0.01"
          max="9.99"
        
        />

        <button type="submit" title="Send">Send</button>
      </form>
    </main>
    <script>
      const form = document.querySelector("form");

      form.addEventListener("submit", async (e) => {
        e.preventDefault()
        const animedata = {
          animetitle: document.getElementById("animename").value,
          animeauthor: document.getElementById("animeauthor").value,
          rating: document.getElementById("rating").value,
        };
        const response = await fetch("/post", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(animedata),
        });
        alert("Successfully sent to server..")
      });
    </script>
  </body>
</html>
